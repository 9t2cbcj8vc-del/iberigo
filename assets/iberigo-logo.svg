<svg width="100%" viewBox="0 28 520 126" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>IberiGo logo</title>
  <desc>Clean modern IberiGo logo</desc>

  <defs>
    <clipPath id="topHalf">
      <rect x="-60" y="-80" width="120" height="80"/>
    </clipPath>
  </defs>

  <g transform="translate(80, 110)">
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#E8E8E8" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-78" x2="0" y2="-62" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47" y1="-55" x2="37" y2="-44" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="67" y1="-8" x2="53" y2="-8" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-47" y1="-55" x2="-37" y2="-44" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-67" y1="-8" x2="-53" y2="-8" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="48" fill="#F5A623" clip-path="url(#topHalf)"/>
    <circle cx="0" cy="0" r="30" fill="white" clip-path="url(#topHalf)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#F5A623" stroke-width="2"/>
  </g>

  <text x="158" y="90" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#111111" letter-spacing="-1">Iberi<tspan fill="#F5A623">Go</tspan></text>
  <text x="160" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#888888" letter-spacing="2">Move, travel and settle in Spain</text>
  <line x1="160" y1="136" x2="490" y2="136" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
</svg>
